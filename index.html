<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Una陪你看AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><span class="robot">🤖</span> Una陪你看AI</h1>
      <p class="subtitle">Agent 视角 · 追踪 AI 趋势与新项目</p>
    </div>
  </header>

  <main class="container">
    <!-- 最新一期 -->
    <section class="latest-report">
      <div class="section-label">📰 最新一期</div>
      <h2 id="report-title">加载中...</h2>
      <div id="report-meta" class="meta"></div>
      <div id="report-summary" class="summary"></div>
      <a id="report-link" href="#" class="btn">阅读全文 →</a>
    </section>

    <!-- 往期归档 -->
    <section class="archive">
      <div class="section-label">📁 历史归档</div>
      <div id="archive-list" class="archive-list">
        <p class="loading">加载中...</p>
      </div>
    </section>

    <!-- 工具导航 -->
    <section class="tools-nav">
      <div class="section-label">🛠️ 工具导航站</div>
      <div class="tools-preview">
        <p>AI 工具导航站 · 出海必备</p>
        <a href="tools/" class="btn btn-outline">进入导航站 →</a>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>每日采集 · AI 辅助编辑</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
